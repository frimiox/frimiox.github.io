<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Showcase</title>
    <meta name="description" content="A curated collection of apps built with creativity and care." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="App Showcase" />
    <meta property="og:description" content="A curated collection of apps built with creativity and care." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>

    <!-- HEADER -->
    <header class="site-header">
      <div class="header-inner">
        <a href="#" class="logo" aria-label="App Showcase home">
          <span class="logo-mark">✦</span>
          <span class="logo-text">FrimioX Apps</span>
        </a>
        <div class="header-actions">
          <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
            <span class="theme-icon theme-icon--light">☀</span>
            <span class="theme-icon theme-icon--dark">☾</span>
          </button>
        </div>
      </div>
    </header>

    <!-- HERO -->
    <section class="hero">
      <div class="hero-inner">
        <div class="hero-badge">Built with care</div>
        <h1 class="hero-title">Apps worth<br /><em>exploring</em></h1>
        <p class="hero-sub">A curated collection of projects — from productivity tools to creative experiments.</p>

        <!-- SEARCH -->
        <div class="search-wrap">
          <span class="search-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </span>
          <input
            type="search"
            class="search-input"
            id="searchInput"
            placeholder="Search apps…"
            autocomplete="off"
            spellcheck="false"
            aria-label="Search apps"
          />
          <button class="search-clear" id="searchClear" aria-label="Clear search" hidden>✕</button>
        </div>
      </div>
    </section>

    <!-- FILTERS -->
    <div class="filters-bar">
      <div class="filters-inner">
        <div class="filter-tabs" id="filterTabs" role="tablist" aria-label="Filter apps by category">
          <!-- tabs injected by JS -->
        </div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="main" id="main">
      <div class="container">
        <!-- STATS ROW -->
        <div class="stats-row" id="statsRow">
          <span class="stats-count" id="statsCount"></span>
          <div class="sort-wrap">
            <label for="sortSelect" class="sr-only">Sort by</label>
            <select class="sort-select" id="sortSelect" aria-label="Sort apps">
              <option value="featured">Featured</option>
              <option value="newest">Newest</option>
              <option value="name">Name A–Z</option>
            </select>
          </div>
        </div>

        <!-- APP GRID -->
        <div class="app-grid" id="appGrid" role="list">
          <!-- cards injected by JS -->
        </div>

        <!-- EMPTY STATE -->
        <div class="empty-state" id="emptyState" hidden>
          <div class="empty-icon">🔭</div>
          <p class="empty-title">No apps found</p>
          <p class="empty-sub">Try a different search or category.</p>
          <button class="btn btn--secondary" id="emptyReset">Clear filters</button>
        </div>
      </div>
    </main>

    <!-- APP MODAL -->
    <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true" hidden>
      <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="modal-close" id="modalClose" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <div class="modal-body" id="modalBody">
          <!-- content injected by JS -->
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="footer-inner">
        <span>© 2026 FrimioXTech</span>
        <span>Made with ✦</span>
      </div>
    </footer>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
